# All OM.jl subpackages live in-tree as sibling directories. Point Pkg at the
# local checkouts so resolve uses the working copies instead of whatever happens
# to be cached in the General registry. OMRuntimeExternalC in particular is not
# registered at all. Bumping a subpackage version only requires editing the
# sibling's Project.toml - these pointers stay the same.
[sources]
Absyn = { path = "../Absyn.jl" }
DAE = { path = "../DAE.jl" }
ImmutableList = { path = "../ImmutableList.jl" }
ListUtil = { path = "../ListUtil.jl" }
MetaModelica = { path = "../MetaModelica.jl" }
OMFrontend = { path = "../OMFrontend.jl" }
OMParser = { path = "../OMParser.jl" }
OMRuntimeExternalC = { path = "../OMRuntimeExternalC.jl" }
